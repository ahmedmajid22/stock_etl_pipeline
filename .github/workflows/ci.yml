name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: pip install flake8 black isort

      - name: flake8
        run: flake8 src/ airflow/dags/ --max-line-length=120 --ignore=E203,W503

      - name: black (check only)
        run: black --check src/ airflow/dags/

      - name: isort (check only)
        run: isort --check-only src/ airflow/dags/

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: stocks
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      API_KEY: test_key  # pragma: allowlist secret
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: stocks
      DB_USER: airflow
      DB_PASSWORD: airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@localhost/stocks
      FERNET_KEY: ${{ secrets.FERNET_KEY || 'dGhpcyBpcyBhIHRlc3Qga2V5IG9ubHkgZm9yIENJIQ==' }}  # pragma: allowlist secret
      AIRFLOW__WEBSERVER__SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            apache-airflow==2.8.1 \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.1/constraints-3.11.txt"
          pip install \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.8.1/constraints-3.11.txt" \
            -r docker/requirements.txt
          pip install pytest==7.4.0 pytest-cov==4.1.0

      - name: Apply DB schema
        run: |
          psql postgresql://airflow:airflow@localhost/stocks -f docker/init_db.sql

      - name: Run tests
        run: |
          pytest src/tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          push: false
          tags: stock-etl:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration:
    name: Integration smoke test
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Write CI .env # pragma: allowlist secret
        run: | # pragma: allowlist secret
          cat > .env <<'EOF' # pragma: allowlist secret
          API_KEY=ci_test_key  # pragma: allowlist secret
          DB_HOST=postgres
          DB_PORT=5432
          DB_NAME=stocks
          DB_USER=airflow
          DB_PASSWORD=airflow
          AIRFLOW__CORE__EXECUTOR=CeleryExecutor
          AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/stocks
          FERNET_KEY=dGhpcyBpcyBhIHRlc3Qga2V5IG9ubHkgZm9yIENJIQ==  # pragma: allowlist secret
          AIRFLOW__WEBSERVER__SECRET_KEY=ci-integration-secret
          AIRFLOW_ADMIN_USER=admin
          AIRFLOW_ADMIN_PASSWORD=admin  # pragma: allowlist secret
          AIRFLOW_ADMIN_EMAIL=admin@example.com
          AIRFLOW_UID=50000
          AIRFLOW__CELERY__WORKER_CONCURRENCY=2
          EOF

      - name: Start stack
        working-directory: docker
        run: |
          docker compose up -d --build

      - name: Wait for Airflow webserver to be healthy
        run: |
          echo "Waiting for webserver..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health | grep -q '"status": "healthy"'; then
              echo "Webserver is healthy after ${i} attempts"
              exit 0
            fi
            echo "  attempt ${i}/30 — not ready yet"
            sleep 15
          done
          echo "ERROR: Webserver did not become healthy in time"
          docker compose -f docker/docker-compose.yml logs
          exit 1

      - name: Verify Grafana is reachable
        run: |
          curl -sf http://localhost:3000/api/health | grep -q '"database": "ok"'

      - name: Verify Prometheus is reachable
        run: |
          curl -sf http://localhost:9090/-/healthy

      - name: Verify Pushgateway is reachable
        run: |
          curl -sf http://localhost:9091/-/healthy

      - name: Check Airflow pools exist
        run: |
          TOKEN=$(curl -sf -u admin:admin http://localhost:8080/api/v1/auth/token \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"admin\",\"password\":\"admin\"}" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          curl -sf -H "Authorization: Bearer ${TOKEN}" \
            http://localhost:8080/api/v1/pools/alpha_vantage_pool | grep -q '"pool": "alpha_vantage_pool"'

      - name: Dump logs on failure
        if: failure()
        working-directory: docker
        run: |
          docker compose logs --tail=100

      - name: Tear down
        if: always()
        working-directory: docker
        run: |
          docker compose down -v --remove-orphans
