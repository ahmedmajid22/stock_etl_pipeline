name: CI Showcase

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.3.0" "black==24.2.0" pytest pytest-cov
          pip install -r docker/requirements.txt

      - name: Run linters
        run: |
          ruff check src/ tests/
          black --check --diff src/ tests/

      - name: Run tests
        run: |
          pytest tests/unit tests/integration -v --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Airflow image
        run: |
          docker buildx build \
            --load \
            -t stock-etl-airflow:ci \
            -f docker/Dockerfile \
            docker/
      - name: Quick Docker test
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/dags:/opt/airflow/dags \
            -e AIRFLOW__CORE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db \
            stock-etl-airflow:ci \
            bash -c "airflow db init && airflow dags list"
