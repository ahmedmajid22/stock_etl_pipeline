apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    orgId: 1
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    version: 1   # ✅ CRITICAL FIX (Grafana 12)
    jsonData:
      httpMethod: POST
      timeInterval: 15s
